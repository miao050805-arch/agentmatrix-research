name: Factor Validation

on:
  pull_request:
    paths:
      - 'research_core/factor_lab/**'
      - 'submissions/**'
      - 'contracts/factor_research.py'
  workflow_dispatch:
    inputs:
      factors:
        description: 'Factor names (for manual run on alpha101)'
        required: false
        default: ''

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy pandas scipy pytest -q

      - name: Detect changed factors
        id: detect
        shell: bash
        run: |
          set -o pipefail
          git diff --name-only origin/${{ github.base_ref }}...HEAD
          python scripts/ci_detect_changes.py \
            --base-ref "origin/${{ github.base_ref }}" \
            --output-json /tmp/changed_factors.json
          cat /tmp/changed_factors.json

      - name: "Run unit tests [Layer 1: Formula]"
        shell: bash
        run: |
          set -o pipefail
          python -m pytest research_core/factor_lab/ tests/ -v --tb=short 2>&1 | tee /tmp/unit_test_output.txt

      - name: "Run submission tests [Layer 1: Formula]"
        shell: bash
        run: |
          set -o pipefail
          : > /tmp/submission_test_output.txt
          if [ -f /tmp/changed_submissions.txt ] && [ -s /tmp/changed_submissions.txt ]; then
            status=0
            while IFS= read -r sub_dir; do
              if [ -f "$sub_dir/test_factor.py" ]; then
                echo "Testing: $sub_dir"
                if ! python -m pytest "$sub_dir/test_factor.py" -v --tb=short 2>&1 | tee -a /tmp/submission_test_output.txt; then
                  status=1
                fi
              fi
            done < /tmp/changed_submissions.txt
            exit "$status"
          else
            echo "No submission changes detected"
          fi

      - name: "Run factor_lab validation [Layer 1+2+3]"
        shell: bash
        run: |
          set -o pipefail
          python scripts/ci_factor_validate.py \
            --changed-json /tmp/changed_factors.json \
            --output-dir /tmp/validation_output \
            2>&1 | tee /tmp/validation_run.txt

      - name: Generate PR comment
        id: comment
        if: always()
        run: |
          python scripts/ci_generate_pr_comment.py \
            --unit-test-log /tmp/unit_test_output.txt \
            --submission-test-log /tmp/submission_test_output.txt \
            --validation-dir /tmp/validation_output \
            --changed-json /tmp/changed_factors.json \
            --output /tmp/pr_comment.md

      - name: Post PR comment
        if: always() && github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v3
        with:
          file-path: /tmp/pr_comment.md
          comment-tag: factor-validation
          mode: recreate
          create-if-not-exists: true
