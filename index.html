<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Factor Lab</title>
  <meta name="description" content="Factor Lab Supabase dashboard entry.">
  <meta http-equiv="refresh" content="0; url=./factor-lab-dashboard/">
  <style>
    :root {
      color-scheme: light;
      --ink: #0b3551;
      --muted: #5d7185;
      --line: #d6e2ee;
      --blue: #0b4f7a;
      --bg: #f4f8fc;
      --panel: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    main {
      width: min(560px, calc(100vw - 40px));
      padding: 32px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 18px 42px rgba(37, 62, 86, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 6px;
      background: var(--blue);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
  <script>
    window.location.replace("./factor-lab-dashboard/");
  </script>
</head>
<body>
  <main>
    <h1>正在进入 Factor Lab 因子库</h1>
    <p>这个 GitHub Pages 根入口已改为 Factor Lab 面板入口，页面数据只从 Supabase 读取。</p>
    <a href="./factor-lab-dashboard/">打开 Factor Lab</a>
  </main>
</body>
</html>
